services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: revealid
      POSTGRES_USER: revealid
      POSTGRES_PASSWORD: revealid
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revealid -d revealid"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://revealid:revealid@postgres:5432/revealid?schema=public
      API_HOST: 0.0.0.0
      API_PORT: 4000
      WEB_ORIGIN: http://localhost:3000
      AUTH_ACCESS_TOKEN_SECRET: local-access-secret-at-least-32-characters
      AUTH_REFRESH_TOKEN_SECRET: local-refresh-secret-at-least-32-characters
      COOKIE_SECURE: "false"
      NODE_ENV: development
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: /api
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres-data:
